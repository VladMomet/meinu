# =======================================================================
# MeiNu — Nginx конфигурация для 3 сайтов на одной VM.
#
# Копируется в /etc/nginx/sites-available/meinu и симлинкается в
# /etc/nginx/sites-enabled/. После certbot Let's Encrypt эти server-блоки
# получат автоматически добавленные listen 443 ssl и пути к сертификатам.
# =======================================================================

# --- MeiNu (основной, ×2.0) → PM2 process на порту 3000 --------------
server {
    server_name meinu.ru www.meinu.ru;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen 80;
}

